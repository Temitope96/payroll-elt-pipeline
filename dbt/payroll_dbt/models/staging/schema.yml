version: 2

models:
  - name: stg_employees
    description: "Cleaned employee records from the staging layer"
    columns:
      - name: employee_id
        description: "Primary key"
        tests:
          - unique
          - not_null
      - name: email
        tests:
          - unique
          - not_null
      - name: country_code
        tests:
          - not_null
          - accepted_values:
              values:
                ["NG", "US", "GB", "CA", "DE", "FR", "IN", "BR", "ZA", "AU"]
      - name: salary_usd
        tests:
          - not_null

  - name: stg_transactions
    columns:
      - name: transaction_id
        tests:
          - unique
          - not_null
      - name: employee_id
        tests:
          - not_null
          - relationships:
              to: ref('stg_employees')
              field: employee_id
      - name: status
        tests:
          - accepted_values:
              values: ["PROCESSED", "PENDING", "FAILED"]
      - name: net_pay_usd
        tests:
          - not_null
